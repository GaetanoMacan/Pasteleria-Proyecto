	<title>Personalizados</title>

<body>
	<button id="boton">Mostrar mensaje</button>

<div id="modal" class="oculto">
  <div class="modal-contenido">
    <p>Bienvenido a la pasteleria Juanelo.</p>
    <button id="cerrar">Cerrar</button>
  </div>
</div>
<main>
		<h1> PERSONALIZA TU TORTA</h1>
		<h2> Bizcochuelo</h2>
<form> 
			<label for="chocolate"> Chocolate </label>
			<input type="radio" id="chocolate" name="bizcochuelo"  value="chocolate" />
			<label for="vainilla"> Vainilla </label>
			<input type="radio" id="vainilla" name="bizcochuelo"  value="vainilla" />
			<label for="red_velvet"> Red Velvet </label>
			<input type="radio" id="red_velvet" name="bizcochuelo"  value="red_velvet" />
			<label for="marmolado"> Marmolado </label>
			<input type="radio" id="marmolado" name="bizcochuelo"  value="marmolado" />
		<h2> Coberturas </h2>
			<label for="crema"> Crema </label>
			<input type="radio" id="crema" name="Coberturas"  value="crema" />
			<label for="fondane"> Fondane </label>
			<input type="radio" id="fondane" name="Coberturas"  value="fondane" />
			<label for="chocolate_2"> Chocolate </label>
			<input type="radio" id="chocolate_2" name="Coberturas"  value="chocolate_2" />
			<label for="crema_b2"> Crema Bonobon </label>
			<input type="radio" id="crema_b2" name="Coberturas"  value="crema_b2" />
		<h2> Toppings de Cobertura </h2>
			<label for="chips_choco"> Chips de Chocolate </label>
			<input type="radio" id="chips_choco" name="Toppings"  value="chips_choco" />
			<label for="chips_chocoblanco"> Chips de Chocolate Blanco </label>
			<input type="radio" id="chips_chocoblanco" name="Toppings"  value="chips_chocoblanco" />
			<label for="rocklets"> Rocklets </label>
			<input type="radio" id="rocklets" name="Toppings"  value="rocklets" />
			<label for="mini_rocklets"> Mini Rocklets </label>
			<input type="radio" id="mini_rocklets" name="Toppings"  value="mini_rocklets" />
			<label for="mini_oreo"> Mini Oreo </label>
			<input type="radio" id="mini_oreo" name="Toppings"  value="mini_oreo" />
		<h2> Rellenos</h2> 
			<label for="chocolate_3"> Chocolate </label>
			<input type="checkbox" id="chocolate_3" name="relleno"  value="chocolate_3" />
			<label for="crema_2"> Vainilla </label>
			<input type="checkbox" id="crema_2" name="relleno"  value="crema_2" />
			<label for="crema_b"> Crema Bonobon </label>
			<input type="checkbox" id="crema_b" name="relleno"  value="crema_b" />
			<label for="ddl"> Dulce de Leche </label>
			<input type="checkbox" id="ddl" name="relleno"  value="ddl" />
			<label for="crema_choc"> Crema Chocotorta </label>
			<input type="checkbox" id="crema_choc" name="relleno"  value="crema_choc" />
			<input type="submit" name="Pedir" value="Pedir" class="enviar"/>
</form>
</main>
